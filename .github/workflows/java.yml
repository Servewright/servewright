name: Java CI

on:
  push:
    paths:
      - "java/**"
      - "spec/**"
  pull_request:
    paths:
      - "java/**"
      - "spec/**"

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: java
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Verify
        run: mvn --batch-mode verify
