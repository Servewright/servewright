name: Dart CI

on:
  push:
    paths:
      - "dart/**"
      - "spec/**"
  pull_request:
    paths:
      - "dart/**"
      - "spec/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Test servewright_flutter
        working-directory: dart/servewright_flutter
        run: flutter test

      - name: Test servewright_flutter_material
        working-directory: dart/servewright_flutter_material
        run: flutter test
